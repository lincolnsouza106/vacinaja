version: '3.8'

services:
  vacinaja-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: vacinaja:latest
    container_name: vacinaja-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    volumes:
      - vacinaja-data:/app/data
    restart: unless-stopped

volumes:
  vacinaja-data:
