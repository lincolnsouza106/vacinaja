<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Login - VacinaJá</title>
</head>
<body>
    <main class="auth-page">
        <section class="auth-card">
            <div class="auth-brand">
                <span class="brand-mark">VJ</span>
                <div>
                    <h1 class="auth-title">VacinaJá</h1>
                    <p class="auth-subtitle">Acesse com seu e-mail cadastrado</p>
                </div>
            </div>

            <div th:if="${param.error}" class="status-message status-message--danger">
                Credenciais inválidas.
            </div>
            <div th:if="${param.logout}" class="status-message status-message--success">
                Você saiu com sucesso.
            </div>

            <form th:action="@{/login}" method="post" class="form-panel">
                <div class="form-group">
                    <label for="username">E-mail</label>
                    <input type="email" id="username" name="username" class="form-control" required autofocus />
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" class="form-control" required />
                </div>
                <button type="submit" class="btn btn--full">Entrar</button>
            </form>

            <div class="form-actions">
                <a th:href="@{/}" class="btn btn--link">Voltar ao portal</a>
            </div>
        </section>
    </main>
</body>
</html>
