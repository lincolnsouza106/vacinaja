<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Erro - VacinaJá</title>
</head>
<body>
    <div id="app" style="display:flex; justify-content: center; align-items: center; min-height:100vh; text-align: center;">
        <div class="card" style="max-width: 500px; width: 100%;">
            <h1 style="color: var(--danger); margin-bottom: 1rem;">Ops! Algo deu errado.</h1>
            <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 1.1rem;" th:text="${mensagem != null ? mensagem : 'A página solicitada não pôde ser processada.'}"></p>
            <a th:href="@{/}" class="btn">Voltar ao Início</a>
        </div>
    </div>
</body>
