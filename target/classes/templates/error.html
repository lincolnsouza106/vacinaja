<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Erro - VacinaJá</title>
</head>
<body>
    <main class="error-page">
        <section class="error-card">
            <span class="brand-mark">VJ</span>
            <div>
                <h1 class="error-title text-danger">Ops! Algo deu errado.</h1>
                <p class="error-copy" th:text="${mensagem != null ? mensagem : 'A página solicitada não pôde ser processada.'}"></p>
            </div>
            <a th:href="@{/}" class="btn">Voltar ao Início</a>
        </section>
    </main>
</body>
</html>
