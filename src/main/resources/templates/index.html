<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>VacinaBrasil - Sistema Nacional</title>
</head>
<body>
    <div id="app" style="display: block;">
        
        <!-- Top Navbar -->
        <nav class="navbar">
            <a href="/" class="navbar-brand">
                VacinaBrasil <span>Sistema Nacional de Vacinação</span>
            </a>
            
            <ul class="nav-links">
                <li><a th:href="@{/}" th:class="${view == 'vacinas'} ? 'nav-item active' : 'nav-item'">Início</a></li>
                <li><a th:href="@{/postos}" th:class="${view == 'postos'} ? 'nav-item active' : 'nav-item'">Postos de Vacinação</a></li>
                <li><a th:href="@{/campanhas}" th:class="${view == 'campanhas'} ? 'nav-item active' : 'nav-item'">Campanhas</a></li>
                <li><a th:href="@{/registrar}" th:class="${view == 'registrar'} ? 'nav-item active' : 'nav-item'">Carteira Digital</a></li>
                <li><a th:href="@{/pendencias}" th:class="${view == 'pendencias'} ? 'nav-item active' : 'nav-item'">Agendamento</a></li>
                <!-- Apenas Admin vê Gerenciamento -->
                <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/usuarios}" th:class="${view == 'usuarios'} ? 'nav-item active' : 'nav-item'">Gerenciar Usuários</a></li>
            </ul>

            <div class="nav-user">
                <div sec:authorize="isAuthenticated()" style="display:flex; align-items:center; gap: 0.5rem;">
                    <div class="avatar" th:text="${#strings.substring(#authentication.name, 0, 2).toUpperCase()}">MC</div>
                    <form th:action="@{/logout}" method="post" style="margin:0;">
                        <button type="submit" style="background:transparent; border:none; color:rgba(255,255,255,0.8); cursor:pointer; font-size:0.85rem; text-decoration:underline;">Sair</button>
                    </form>
                </div>
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn" style="background: white; color: var(--primary);">Entrar</a>
                </div>
            </div>
        </nav>

        <!-- Breadcrumb -->
        <div class="breadcrumb">
            Portal > <span th:text="${view == 'vacinas' ? 'Início' : (view == 'postos' ? 'Postos de Vacinação' : (view == 'campanhas' ? 'Campanhas' : (view == 'registrar' ? 'Carteira Digital' : 'Página')))}">Início</span>
        </div>
        
        <!-- Main Content Area -->
        <main class="content-wrapper">
            <!-- Alert Banner (Somente na Home e se logado) -->
            <div sec:authorize="isAuthenticated()" th:if="${view == 'vacinas'}" class="alert-banner">
                <span style="font-weight:700; margin-right:0.5rem;">Alerta:</span> Dose pendente: COVID-19 — agendada para 14 de fevereiro de 2026
                <a href="/pendencias">Ver detalhes</a>
            </div>

            <div th:if="${view == 'vacinas'}">
                <div th:replace="~{fragments :: vacinas}"></div>
            </div>
            <div th:if="${view == 'postos'}">
                <div th:replace="~{fragments :: postos}"></div>
            </div>
            <div th:if="${view == 'registrar'}">
                <div th:replace="~{fragments :: registrar}"></div>
            </div>
            <div th:if="${view == 'pendencias'}">
                <div th:replace="~{fragments :: pendencias}"></div>
            </div>
            <div th:if="${view == 'usuarios'}">
                <div th:replace="~{fragments :: usuarios}"></div>
            </div>
            <div th:if="${view == 'campanhas'}">
                <div th:replace="~{fragments :: campanhas}"></div>
            </div>
        </main>
    </div>
</body>
</html>
