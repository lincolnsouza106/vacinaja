<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>VacinaJá - Sistema Nacional</title>
</head>
<body>
    <div class="app-shell" th:with="pageLabel=${view == 'vacinas' ? 'Início' : (view == 'carteira' ? 'Carteira de Vacinação' : (view == 'postos' ? 'Postos de Vacinação' : (view == 'campanhas' ? 'Campanhas' : (view == 'gerenciarVacinas' ? 'Gerenciar Vacinas' : (view == 'registrar' ? 'Registrar Dose' : (view == 'agendamentos' ? 'Agendamentos' : (view == 'pendencias' ? 'Pendências' : 'Gerenciar Usuários')))))))}">
        <nav class="topbar" aria-label="Navegação principal">
            <a th:href="@{/}" class="brand">
                <span class="brand-mark">VJ</span>
                <span class="brand-copy">
                    <span class="brand-name">VacinaJá</span>
                    <span class="brand-subtitle">Sistema nacional de vacinação</span>
                </span>
            </a>

            <ul class="nav-links">
                <li><a th:href="@{/}" th:class="${view == 'vacinas'} ? 'nav-item active' : 'nav-item'">Início</a></li>
                <li><a th:href="@{/carteira}" th:class="${view == 'carteira'} ? 'nav-item active' : 'nav-item'">Carteira</a></li>
                <li><a th:href="@{/postos}" th:class="${view == 'postos'} ? 'nav-item active' : 'nav-item'">Postos</a></li>
                <li><a th:href="@{/campanhas}" th:class="${view == 'campanhas'} ? 'nav-item active' : 'nav-item'">Campanhas</a></li>
                <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/admin/vacinas}" th:class="${view == 'gerenciarVacinas'} ? 'nav-item active' : 'nav-item'">Vacinas</a></li>
                <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/registrar}" th:class="${view == 'registrar'} ? 'nav-item active' : 'nav-item'">Registrar Dose</a></li>
                <li><a th:href="@{/agendamentos}" th:class="${view == 'agendamentos'} ? 'nav-item active' : 'nav-item'">Agendamentos</a></li>
                <li sec:authorize="hasRole('ADMIN')"><a th:href="@{/usuarios}" th:class="${view == 'usuarios'} ? 'nav-item active' : 'nav-item'">Usuários</a></li>
            </ul>

            <div class="nav-user">
                <div sec:authorize="isAuthenticated()" class="user-menu">
                    <div class="avatar" th:text="${#strings.substring(#authentication.name, 0, 2).toUpperCase()}">MC</div>
                    <form th:action="@{/logout}" method="post" class="logout-form">
                        <button type="submit" class="btn btn--ghost">Sair</button>
                    </form>
                </div>
                <div sec:authorize="!isAuthenticated()">
                    <a th:href="@{/login}" class="btn btn--light">Entrar</a>
                </div>
            </div>
        </nav>

        <div class="breadcrumb">
            <div class="breadcrumb-inner">
                <span>Portal</span>
                <span aria-hidden="true">/</span>
                <span class="breadcrumb-current" th:text="${pageLabel}">Início</span>
            </div>
        </div>

        <main class="content-wrapper">
            <div sec:authorize="isAuthenticated()" th:if="${view == 'vacinas'}" class="notice">
                <p><strong>Carteira:</strong> <span th:text="${proximaDoseValor + ' - ' + proximaDoseDescricao}">Acompanhe sua situação vacinal</span></p>
                <a th:href="@{/carteira}" class="btn btn--light">Ver carteira</a>
            </div>

            <div th:if="${view == 'vacinas'}">
                <div th:replace="~{fragments :: vacinas}"></div>
            </div>
            <div th:if="${view == 'carteira'}">
                <div th:replace="~{fragments :: carteira}"></div>
            </div>
            <div th:if="${view == 'postos'}">
                <div th:replace="~{fragments :: postos}"></div>
            </div>
            <div th:if="${view == 'registrar'}">
                <div th:replace="~{fragments :: registrar}"></div>
            </div>
            <div th:if="${view == 'pendencias'}">
                <div th:replace="~{fragments :: pendencias}"></div>
            </div>
            <div th:if="${view == 'agendamentos'}">
                <div th:replace="~{fragments :: agendamentos}"></div>
            </div>
            <div th:if="${view == 'usuarios'}">
                <div th:replace="~{fragments :: usuarios}"></div>
            </div>
            <div th:if="${view == 'campanhas'}">
                <div th:replace="~{fragments :: campanhas}"></div>
            </div>
            <div th:if="${view == 'gerenciarVacinas'}">
                <div th:replace="~{fragments :: gerenciarVacinas}"></div>
            </div>
        </main>
    </div>
    <script th:src="@{/js/modals.js}"></script>
</body>
</html>
