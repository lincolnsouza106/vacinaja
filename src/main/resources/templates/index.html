<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>VacinaJá</title>
</head>
<body>
    <div id="app">
        <aside class="sidebar">
            <div class="logo">VacinaJá</div>
            <ul class="nav-links">
                <li><a th:href="@{/}" th:class="${view == 'vacinas'} ? 'nav-item active' : 'nav-item'">Consultar por Idade</a></li>
                <li><a th:href="@{/postos}" th:class="${view == 'postos'} ? 'nav-item active' : 'nav-item'">Localizar Posto</a></li>
                <li><a th:href="@{/registrar}" th:class="${view == 'registrar'} ? 'nav-item active' : 'nav-item'">Registrar Vacinação</a></li>
                <li><a th:href="@{/pendencias}" th:class="${view == 'pendencias'} ? 'nav-item active' : 'nav-item'">Verificar Pendências</a></li>
                <li><a th:href="@{/campanhas}" th:class="${view == 'campanhas'} ? 'nav-item active' : 'nav-item'">Campanhas Atuais</a></li>
                <li><a th:href="@{/usuarios}" th:class="${view == 'usuarios'} ? 'nav-item active' : 'nav-item'">Gerenciar Usuários</a></li>
            </ul>
            
            <div style="margin-top: auto; padding-top: 2rem; border-top: 1px solid var(--glass-border);">
                <div th:if="${#authorization.expression('isAuthenticated()')}">
                    <p style="color:var(--text-muted); font-size:0.9rem; margin-bottom: 0.5rem;" th:text="'Olá, ' + ${#authentication.name}"></p>
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn" style="padding: 0.5rem; font-size: 0.9rem;">Sair</button>
                    </form>
                </div>
                <div th:unless="${#authorization.expression('isAuthenticated()')}">
                    <a th:href="@{/login}" class="btn" style="display:block; text-align:center; padding: 0.5rem; font-size: 0.9rem; text-decoration:none;">Área Restrita</a>
                </div>
            </div>
        </aside>
        
        <main class="content">
            <!-- Dynamic Content Fragment -->
            <div th:replace="~{ fragments :: ${view} }"></div>
        </main>
    </div>
</body>
</html>
