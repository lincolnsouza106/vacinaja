<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Login - VacinaJá</title>
    <style>
        .login-container {
            width: 100%;
            max-width: 400px;
            margin: auto;
            margin-top: 10vh;
        }
        .error {
            color: #ef4444;
            margin-bottom: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="card">
            <div class="logo" style="display:block; text-align:center; margin-bottom:1rem;">VacinaJá Admin</div>
            <div th:if="${param.error}" class="error">
                Usuário ou senha inválidos.
            </div>
            <div th:if="${param.logout}" style="color:#10b981; margin-bottom:1rem; text-align:center;">
                Deslogado com sucesso.
            </div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label>Usuário:</label>
                    <input type="text" name="username" class="form-control" placeholder="admin" required autofocus>
                </div>
                <div class="form-group">
                    <label>Senha:</label>
                    <input type="password" name="password" class="form-control" placeholder="admin" required>
                </div>
                <button type="submit" class="btn">Entrar</button>
            </form>
            <div style="margin-top: 1rem; text-align:center;">
                <a th:href="@{/}" style="color:var(--text-muted); text-decoration:none;">&larr; Voltar ao site</a>
            </div>
        </div>
    </div>
</body>
</html>
