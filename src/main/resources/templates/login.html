<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <title>Login - VacinaJá</title>
    <style>
        .login-container {
            width: 100%;
            max-width: 400px;
            margin: auto;
            margin-top: 10vh;
        }
        .error {
            color: #ef4444;
            margin-bottom: 1rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="app" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">
        <div class="card" style="max-width: 400px; width: 100%;">
            <div class="logo" style="display:flex; justify-content:center; align-items:center; margin-bottom:2rem; font-size:1.5rem; font-weight:700; color:var(--primary);">
                VacinaBrasil
            </div>
            
            <div th:if="${param.error}" style="color: var(--danger); text-align: center; margin-bottom: 1rem; font-weight: 600; padding: 0.5rem; background: #fee2e2; border-radius: 4px;">
                Credenciais inválidas.
            </div>
            <div th:if="${param.logout}" style="color: var(--success); text-align: center; margin-bottom: 1rem; font-weight: 600; padding: 0.5rem; background: #d1fae5; border-radius: 4px;">
                Você saiu com sucesso.
            </div>
            
            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label for="username">Usuário</label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus />
                </div>
                <div class="form-group">
                    <label for="password">Senha</label>
                    <input type="password" id="password" name="password" class="form-control" required />
                </div>
                <button type="submit" class="btn" style="width: 100%; margin-top: 1rem;">Entrar</button>
            </form>
            <div style="margin-top: 1.5rem; text-align:center;">
                <a th:href="@{/}" style="color:var(--primary); text-decoration:underline; font-size: 0.9rem;">Voltar ao portal</a>
            </div>
        </div>
    </div>
</body>
</html>
